<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNOCAN - Araba</title><style>
body{
background:#050b14;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#4da6ff;
font-size:58px;
text-shadow:0 0 20px #0077ff;
margin-bottom:5px;
}

.sub{
text-align:center;
color:#93a7bd;
font-size:20px;
margin-bottom:25px;
}

.card{
background:#0c1624;
padding:25px;
border-radius:25px;
margin-top:20px;
border:1px solid #1f3d5c;
box-shadow:0 0 20px rgba(0,119,255,.15);
}

h2{
font-size:28px;
margin-top:0;
}

.info{
display:flex;
justify-content:space-between;
font-size:22px;
margin:18px 0;
}

.green{
color:#35d46d;
font-weight:bold;
}

.orange{
color:orange;
font-weight:bold;
}

.red{
color:#ff4d4d;
font-weight:bold;
}

input{
width:100%;
padding:22px;
background:#1a2636;
border:none;
border-radius:20px;
color:white;
font-size:22px;
margin-top:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:22px;
background:#1a2636;
border:none;
border-radius:22px;
color:white;
font-size:22px;
margin-top:20px;
}
</style></head><body><h1>🚗 ARABA</h1>
<div class="sub">
Bakım ve kilometre sistemi
</div><div class="card">
<h2>Motor Yağı</h2><div class="info">
<span>Güncel KM</span>
<span id="km"></span>
</div><div class="info">
<span>Son Yağ Değişimi</span>
<span id="oil"></span>
</div><div class="info">
<span>Kalan KM</span>
<span id="result"></span>
</div>
</div><div class="card">
<h2>📅 Belgeler</h2><div class="info">
<span>Sigorta</span>
<span id="sigortaDurum"></span>
</div><div class="info">
<span>Muayene</span>
<span id="muayeneDurum"></span>
</div>
</div><div class="card">
<h2>Bilgileri Güncelle</h2><input
id="newKM"
type="number"
placeholder="Güncel KM">

<input
id="newOil"
type="number"
placeholder="Son Yağ Değişim KM">

<button onclick="saveKM()">
Kaydet 😎
</button>
</div><button onclick="window.location='index.html'">
⬅ Ana Sayfa
</button><script>

// İlk açılış değerleri
let currentKM =
Number(localStorage.getItem("currentKM")) || 250000;

let lastOil =
Number(localStorage.getItem("lastOil")) || 250000;

const oilInterval = 10000;

// BURAYI YILDA 1 DEĞİŞTİR 😎
const sigortaTarih = "2027-03-15";
const muayeneTarih = "2027-12-01";

function renderPage(){

let kalan =
(lastOil + oilInterval) - currentKM;

// KM göster
document.getElementById("km").innerText =
currentKM.toLocaleString("tr-TR");

document.getElementById("oil").innerText =
lastOil.toLocaleString("tr-TR");

// Yağ hesabı
if(kalan > 1000){

document.getElementById("result").innerHTML =
'<span class="green">'
+ kalan.toLocaleString("tr-TR")
+ ' KM</span>';

}
else if(kalan > 0){

document.getElementById("result").innerHTML =
'<span class="orange">'
+ kalan.toLocaleString("tr-TR")
+ ' KM</span>';

}
else{

document.getElementById("result").innerHTML =
'<span class="red">BAKIM ZAMANI!</span>';

}

// Tarih hesabı
let today = new Date();

let sigortaGun =
Math.ceil(
(new Date(sigortaTarih) - today)
/
(1000 * 60 * 60 * 24)
);

let muayeneGun =
Math.ceil(
(new Date(muayeneTarih) - today)
/
(1000 * 60 * 60 * 24)
);

// Sigorta
document.getElementById("sigortaDurum").innerHTML =
sigortaGun > 30
? '<span class="green">'
+ sigortaGun +
' Gün</span>'
: '<span class="orange">'
+ sigortaGun +
' Gün</span>';

// Muayene
document.getElementById("muayeneDurum").innerHTML =
muayeneGun > 30
? '<span class="green">'
+ muayeneGun +
' Gün</span>'
: '<span class="orange">'
+ muayeneGun +
' Gün</span>';

}

// Kaydet
function saveKM(){

let newKM =
Number(document.getElementById("newKM").value);

let newOil =
Number(document.getElementById("newOil").value);

if(newKM > 0){
currentKM = newKM;
localStorage.setItem(
"currentKM",
currentKM
);
}

if(newOil > 0){
lastOil = newOil;
localStorage.setItem(
"lastOil",
lastOil
);
}

alert("Kaydedildi 😎");

renderPage();

}

renderPage();

</script></body>
</html>
