<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNOCAN V4</title>
<style>
body{margin:0;padding:18px;background:#030b18;color:#fff;font-family:Arial}
.card{background:#071426;border:1px solid #15406e;border-radius:28px;padding:18px;margin:14px 0;box-shadow:0 0 25px rgba(0,120,255,.15)}
.top{text-align:center}
.top h1{font-size:52px;margin:0;color:#eaf2ff;text-shadow:0 0 20px #3b82f6}
.sub{color:#9db3d8}
.car{font-size:70px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row{display:flex;justify-content:space-between;background:#0b1a31;padding:14px;border-radius:18px;margin:8px 0}
.km{font-size:56px;font-weight:bold;text-align:center;color:#dff0ff}
.green{color:#56e36f}
.blue{color:#56a8ff}
.bar{height:18px;background:#10213a;border-radius:20px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#4ade80,#22c55e)}
.fill2{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa)}
input{width:100%;box-sizing:border-box;padding:18px;border-radius:18px;background:#10213a;color:white;border:2px solid #3b82f6}
.purple{border-color:#8b5cf6}
button{width:100%;padding:20px;border:none;border-radius:18px;font-size:30px;font-weight:bold;color:white;background:linear-gradient(90deg,#2563eb,#60a5fa)}
a{color:#60a5fa;text-decoration:none;font-size:28px;display:block;text-align:center}
</style>
</head>
<body>

<div class="top">
<div class="car">🚗</div>
<h1>ARABA</h1>
<div class="sub">Bakım ve kilometre sistemi</div>
</div>

<div class="grid">
<div class="card">
<b>ARAÇ BİLGİLERİ</b>
<div class="row"><span>Marka</span><b>Fiat Uno</b></div>
<div class="row"><span>Model</span><b>60 S</b></div>
<div class="row"><span>Yıl</span><b>1994</b></div>
<div class="row"><span>Motor</span><b>1.1</b></div>
<div class="row"><span>Yakıt</span><b>Benzin/LPG</b></div>
</div>

<div class="card">
<div style="text-align:center">GÜNCEL KM</div>
<div id="km" class="km"></div>
<div style="display:flex;justify-content:space-between;margin:15px 0">
<span class="green">YAĞ DURUMU</span>
<b id="percent" class="green"></b>
</div>
<div class="bar"><div id="oilBar" class="fill"></div></div>
<div id="result" style="text-align:center;margin-top:12px" class="green"></div>
</div>
</div>

<div class="card">
<b>BELGELER</b>
<div class="row"><span>Sigorta</span><b id="sigorta" class="green"></b></div>
<div class="bar"><div style="width:79%" class="fill"></div></div>
<br>
<div class="row"><span>Muayene</span><b id="muayene" class="blue"></b></div>
<div class="bar"><div style="width:93%" class="fill2"></div></div>
</div>

<div class="card">
<b>BAKIM GEÇMİŞİ</b>
<ul><li>250.000 KM - Yağ Değişimi</li></ul>
</div>

<div class="card">
<b>GÜNCELLE</b><br><br>
<input id="newKM" placeholder="Güncel KM giriniz">
<br><br>
<input id="newOil" class="purple" placeholder="Son yağ değişim KM giriniz">
<br><br>
<button onclick="saveKM()">Kaydet 😎</button>
</div>

<div class="card">
<a href="index.html">⬅ Ana Sayfa</a>
</div>

<script>
let currentKM=Number(localStorage.getItem("currentKM"))||250000;
let lastOil=Number(localStorage.getItem("lastOil"))||250000;
const oilInterval=10000;
function render(){
let kalan=(lastOil+oilInterval)-currentKM;
let pct=Math.max(0,Math.min(100,(kalan/oilInterval)*100));
km.innerText=currentKM.toLocaleString("tr-TR")+" KM";
percent.innerText="%"+Math.round(pct);
result.innerText=kalan.toLocaleString("tr-TR")+" KM KALDI";
oilBar.style.width=pct+"%";
let today=new Date();
sigorta.innerText=Math.ceil((new Date("2027-03-15")-today)/86400000)+" Gün";
muayene.innerText=Math.ceil((new Date("2027-12-01")-today)/86400000)+" Gün";
}
function saveKM(){
let a=Number(newKM.value), b=Number(newOil.value);
if(a>0){currentKM=a;localStorage.setItem("currentKM",a);}
if(b>0){lastOil=b;localStorage.setItem("lastOil",b);}
render(); alert("Kaydedildi 😎");
}
render();
</script>
</body></html>
