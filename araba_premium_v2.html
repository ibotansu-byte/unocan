<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNOCAN Premium V2</title>
<style>
body{background:#050b14;color:#fff;font-family:Arial,sans-serif;margin:0;padding:15px}
.card{background:#0c1624;border:1px solid #1f3d5c;border-radius:24px;padding:20px;margin:15px 0}
h1{text-align:center;color:#4da6ff}
.sub{text-align:center;color:#93a7bd}
.info{display:flex;justify-content:space-between;margin:10px 0}
.big{font-size:34px;text-align:center;font-weight:bold}
.bar{height:18px;background:#1a2636;border-radius:20px;overflow:hidden}
.fill{height:100%;background:#35d46d;width:0%}
input,button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:15px;background:#1a2636;color:white}
</style>
</head>
<body>
<h1>🚗 FIAT UNO 60 S</h1>
<div class="sub">1994 • 1.1 • Benzin/LPG</div>

<div class="card">
<div class="big" id="km">250.000 KM</div>
</div>

<div class="card">
<h2>Motor Yağı</h2>
<div id="result" class="big"></div>
<div class="bar"><div id="fill" class="fill"></div></div>
</div>

<div class="card">
<h2>Araç Bilgileri</h2>
<div class="info"><span>Marka</span><span>Fiat</span></div>
<div class="info"><span>Model</span><span>Uno 60 S</span></div>
<div class="info"><span>Yıl</span><span>1994</span></div>
<div class="info"><span>Motor</span><span>1.1</span></div>
<div class="info"><span>Yakıt</span><span>Benzin/LPG</span></div>
</div>

<div class="card">
<h2>📅 Belgeler</h2>
<div class="info"><span>Sigorta</span><span id="sigorta"></span></div>
<div class="info"><span>Muayene</span><span id="muayene"></span></div>
</div>

<div class="card">
<h2>Bakım Geçmişi</h2>
<ul id="history">
<li>250.000 KM - Yağ Değişimi</li>
</ul>
</div>

<div class="card">
<h2>Güncelle</h2>
<input id="newKM" type="number" placeholder="Güncel KM">
<input id="newOil" type="number" placeholder="Son Yağ Değişim KM">
<button onclick="saveKM()">Kaydet 😎</button>
</div>

<script>
let currentKM=Number(localStorage.getItem("currentKM"))||250000;
let lastOil=Number(localStorage.getItem("lastOil"))||250000;
const oilInterval=10000;
const sigortaTarih="2027-03-15";
const muayeneTarih="2027-12-01";

function render(){
let kalan=(lastOil+oilInterval)-currentKM;
document.getElementById("km").innerText=currentKM.toLocaleString("tr-TR")+" KM";
document.getElementById("result").innerText=kalan>0?kalan.toLocaleString("tr-TR")+" KM KALDI":"BAKIM ZAMANI!";
let yuzde=Math.max(0,Math.min(100,(kalan/oilInterval)*100));
document.getElementById("fill").style.width=yuzde+"%";

let today=new Date();
document.getElementById("sigorta").innerText=Math.ceil((new Date(sigortaTarih)-today)/86400000)+" Gün";
document.getElementById("muayene").innerText=Math.ceil((new Date(muayeneTarih)-today)/86400000)+" Gün";
}

function saveKM(){
let nkm=Number(document.getElementById("newKM").value);
let noil=Number(document.getElementById("newOil").value);
if(nkm>0){currentKM=nkm;localStorage.setItem("currentKM",nkm);}
if(noil>0){lastOil=noil;localStorage.setItem("lastOil",noil);}
render();
alert("Kaydedildi 😎");
}
render();
</script>
</body>
</html>
