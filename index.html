<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>UNOCAN V4</title>
<style>
body{background:#050b14;color:white;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{max-width:420px;width:85%;text-align:center}
.card{display:block;background:#071528;border:1px solid #163b66;border-radius:24px;padding:20px;margin:15px 0;color:white;text-decoration:none}
input,button{width:100%;padding:15px;border-radius:15px;border:none;margin-top:10px}
button{background:#2563eb;color:white}
</style></head><body>
<div class="container">
<h1>UNOCAN </h1>

<div id="loginBox">
<h3>Şifre Girişi</h3>
<input type="password" id="pass">
<button onclick="login()">Giriş</button>
</div>

<div id="menu" style="display:none">
<a class="card" href="araba.html">🚗 Araba</a>
<a class="card" href="motor.html">🏍️ Motor</a>
<a class="card" href="#" onclick="changePass()">🔑 Şifre Değiştir</a>
</div>
</div>

<script>
if(!localStorage.getItem("unocanPass")) localStorage.setItem("unocanPass","1234");

function login(){
let p=document.getElementById("pass").value;
if(p===localStorage.getItem("unocanPass")){
sessionStorage.setItem("unocanAuth","ok");
document.getElementById("loginBox").style.display="none";
document.getElementById("menu").style.display="block";
}else alert("Şifre Hatalı");
}

function changePass(){
let oldp=prompt("Eski Şifre");
if(oldp!==localStorage.getItem("unocanPass")) return alert("Hatalı");
let np=prompt("Yeni Şifre");
if(np){localStorage.setItem("unocanPass",np);alert("Şifre değiştirildi");}
}

if(sessionStorage.getItem("unocanAuth")==="ok"){
document.getElementById("loginBox").style.display="none";
document.getElementById("menu").style.display="block";
}
</script></body></html>
