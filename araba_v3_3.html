<!DOCTYPE html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>UNOCAN V3.3</title>
<style>
body{margin:0;padding:20px;background:#020b18;color:#fff;font-family:Arial}
.card{background:#071528;border:1px solid #163b66;border-radius:28px;padding:20px;margin:18px 0}
.row{display:flex;justify-content:space-between;background:#091a30;padding:14px;border-radius:18px;margin:10px 0}
input{width:100%;padding:18px;box-sizing:border-box;background:#10213a;border:2px solid #2f7df6;border-radius:18px;color:#fff}
button,a.btn{display:block;width:100%;box-sizing:border-box;text-align:center;text-decoration:none;padding:18px;border:none;border-radius:18px;background:linear-gradient(90deg,#2563eb,#60a5fa);color:#fff;font-weight:bold;margin-top:12px}
.hidden{display:none}h1{text-align:center} .sub{text-align:center;color:#9fb3d1}
</style></head><body>
<h1>🚗 ARABA</h1><div class='sub'>Bakım ve kilometre sistemi</div>

<div class='card'><b>ARAÇ BİLGİLERİ</b>
<div class='row'><span>Marka</span><b>Fiat Uno</b></div>
<div class='row'><span>Model</span><b>60 S</b></div>
<div class='row'><span>Yıl</span><b>1994</b></div>
<div class='row'><span>Motor</span><b>1.1</b></div>
<div class='row'><span>Yakıt</span><b>Benzin/LPG</b></div>
</div>

<div class='card'><b>🔒 YÖNETİCİ GİRİŞİ</b>
<input id='pass' type='password' placeholder='Şifre'>
<button onclick='login()'>Giriş Yap</button>
</div>

<div id='updateCard' class='card hidden'>
<b>GÜNCELLE</b>
<input placeholder='Güncel KM'>
<input placeholder='Son Yağ Değişim KM' style='margin-top:10px'>
<button>Kaydet 😎</button>
<a class='btn' href='sifre.html'>⚙️ Şifre Ayarları</a>
</div>

<script>
if(!localStorage.getItem('unocanPassword')) localStorage.setItem('unocanPassword','1234');
function login(){
 if(document.getElementById('pass').value===localStorage.getItem('unocanPassword'))
  document.getElementById('updateCard').classList.remove('hidden');
 else alert('Şifre yanlış');
}
</script></body></html>
